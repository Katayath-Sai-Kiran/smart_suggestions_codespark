name: smart_suggestions_codespark
description: >-
  On-device "related items" for Flutter — suggest similar content by meaning,
  fully offline, no API keys. Three-line API powered by local embeddings.
version: 0.2.0

repository: https://github.com/Katayath-Sai-Kiran/smart_suggestions_codespark
homepage: https://ksaikiran.dev
issue_tracker: https://github.com/Katayath-Sai-Kiran/smart_suggestions_codespark/issues

topics:
  - recommendations
  - similar-items
  - offline-ai
  - embeddings
  - local-ai

environment:
  sdk: ">=3.4.0 <4.0.0"
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter
  ai_core_codespark: ^0.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

screenshots:
  - description: 'Find articles similar to an existing one using on-device semantic similarity'
    use-case: Overview
    path: screenshots/similar_to_demo.png
    platforms: [android, ios, macos, windows, linux, web]
  - description: 'Search similar items using free-text input — fully offline, no API keys'
    use-case: Overview
    path: screenshots/free_text_demo.png
    platforms: [android, ios, macos, windows, linux, web]

flutter:
